[llm]
model = "deepseek-v4-flash"
api_key = "YOUR_DEEPSEEK_API_KEY_HERE"
base_url = "https://api.deepseek.com/v1/chat/completions"

# DeepSeek API 参数
max_tokens = 8192
temperature = 0.1

[chunking]
# 已弃用 — Session 2 不再使用滑动窗口
chunk_size = 200
overlap = 25

[standardization]
# 已弃用 — Session 2 使用受控词汇分类，不再需要事后实体标准化
enabled = false
use_llm_for_entities = false

[inference]
# 已弃用 — Session 2 不再需要关系推断
enabled = false
use_llm_for_inference = false
apply_transitive = false

[visualization]
enabled = true
max_nodes = 1000
max_edges = 2000
node_size = 10
edge_width = 2

[classification]
# Session 2 LLM 分类参数
max_sub_industries = 3
temperature = 0.1
max_tokens = 512
